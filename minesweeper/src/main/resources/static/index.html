<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Minesweeper</h1>

    <div class="game-controls">
        <select id="difficulty">
            <option value="easy">Easy (9x9, 10 mines)</option>
            <option value="medium">Medium (16x16, 40 mines)</option>
            <option value="hard">Hard (16x30, 99 mines)</option>
        </select>
        <button id="new-game-btn">New Game</button>
    </div>

    <div class="game-info">
        <div class="info-item">
            <span>Mines left:</span>
            <span id="mines-left">0</span>
        </div>
        <div class="info-item">
            <span>Time:</span>
            <span id="timer">0</span>s
        </div>
    </div>

    <div id="game-board" class="game-board"></div>

    <div id="game-message" class="game-message"></div>
</div>

<script src="script.js"></script>
</body>
</html>
